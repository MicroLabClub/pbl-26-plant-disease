services:
  postgres:
    image: postgres:16-alpine
    container_name: agricure-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agricure
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agricure-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-15}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
      Admin__Email: ${ADMIN_EMAIL:-}
      Admin__Password: ${ADMIN_PASSWORD:-}
    networks:
      - agricure
    restart: unless-stopped

networks:
  agricure:

volumes:
  postgres-data:
