name: Build and Deploy

on:
  push:
    branches: [ develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/agricure-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/agricure-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image names
        id: img
        run: |
          echo "backend=$(echo '${{ env.IMAGE_BACKEND }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "frontend=$(echo '${{ env.IMAGE_FRONTEND }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.backend }}:latest
            ${{ steps.img.outputs.backend }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.frontend }}:latest
            ${{ steps.img.outputs.frontend }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/develop' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image refs
        id: img
        run: |
          echo "backend=$(echo '${{ env.IMAGE_BACKEND }}:${{ github.sha }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "frontend=$(echo '${{ env.IMAGE_FRONTEND }}:${{ github.sha }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Prepare deployment bundle
        run: |
          mkdir -p .deploy
          cat << 'EOF' > .deploy/.env
          IMAGE_BACKEND=${{ steps.img.outputs.backend }}
          IMAGE_FRONTEND=${{ steps.img.outputs.frontend }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_ISSUER=${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
          JWT_SIGNING_KEY=${{ secrets.JWT_SIGNING_KEY }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          CORS_ALLOWED_ORIGIN_0=${{ secrets.CORS_ALLOWED_ORIGIN_0 }}
          API_HOST_PORT=${{ vars.API_HOST_PORT || '8090' }}
          FRONTEND_HOST_PORT=${{ vars.FRONTEND_HOST_PORT || '8082' }}
          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          STORAGE_ACCESS_KEY=${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY=${{ secrets.STORAGE_SECRET_KEY }}
          STORAGE_PUBLIC_BASE_URL=${{ secrets.STORAGE_PUBLIC_BASE_URL }}
          STORAGE_DEFAULT_BUCKET=${{ vars.STORAGE_DEFAULT_BUCKET || 'agricure-frames' }}
          EOF
          cp ops/docker-compose.prod.yml .deploy/docker-compose.yml

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: ".deploy/*"
          target: "~/apps/agricure"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            set -e
            mkdir -p ~/apps/agricure
            cd ~/apps/agricure
            mv -f .deploy/docker-compose.yml docker-compose.yml
            mv -f .deploy/.env .env
            rmdir .deploy 2>/dev/null || true
            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f
