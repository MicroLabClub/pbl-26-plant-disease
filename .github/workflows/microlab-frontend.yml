name: MicroLab Frontend Build and Deploy

# Fallback to building on the 3.8 GB shared box: GitHub's runners build the
# frontend image, push it to GHCR, then SSH into the MicroLab server to pull
# and run it. Triggers on pushes to main (the branch we publish to the
# MicroLabClub/pbl-26-plant-disease repo) and on manual dispatch.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/pbl-26-plant-disease-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "frontend=$(echo '${{ env.IMAGE_FRONTEND }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.frontend }}:latest
            ${{ steps.img.outputs.frontend }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'https://api.agricure.online' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image ref
        id: img
        run: echo "frontend=$(echo '${{ env.IMAGE_FRONTEND }}:${{ github.sha }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Prepare deployment bundle
        run: |
          mkdir -p .deploy
          cat << 'EOF' > .deploy/.env
          IMAGE_FRONTEND=${{ steps.img.outputs.frontend }}
          EOF
          cp ops/docker-compose.microlab.yml .deploy/docker-compose.yml

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          # To use an SSH key instead of a password, replace the line above with:
          #   key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT || secrets.SSH_PORT || 22 }}
          source: ".deploy/*"
          target: "~/apps/plant-disease"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          # key: ${{ secrets.SSH_KEY }}   # ← use instead of password for key auth
          port: ${{ vars.SSH_PORT || secrets.SSH_PORT || 22 }}
          envs: GHCR_USER,GHCR_TOKEN
          script_stop: true
          script: |
            set -e
            mkdir -p ~/apps/plant-disease
            cd ~/apps/plant-disease
            mv -f .deploy/docker-compose.yml docker-compose.yml
            mv -f .deploy/.env .env
            rmdir .deploy 2>/dev/null || true
            # Authenticate to GHCR so the private image can be pulled.
            # (Skip-able if you make the GHCR package public — see ops/microlab-deploy.md)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
