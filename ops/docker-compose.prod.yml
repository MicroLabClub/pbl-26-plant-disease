services:
  postgres:
    image: postgres:16-alpine
    container_name: agricure-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agricure
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: agricure-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Loopback only — host nginx proxies:
    #   https://media.agricure.online  → :9000 (S3 API, public read)
    #   https://storage.agricure.online → :9001 (admin console, login-protected)
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    networks:
      - agricure
    restart: unless-stopped

  api:
    image: ${IMAGE_BACKEND}
    container_name: agricure-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-15}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
      Admin__Email: ${ADMIN_EMAIL:-}
      Admin__Password: ${ADMIN_PASSWORD:-}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN_0:-}
      Cors__AllowedOrigins__1: ${CORS_ALLOWED_ORIGIN_1:-}
      Storage__Endpoint: ${STORAGE_ENDPOINT:-minio:9000}
      Storage__AccessKey: ${STORAGE_ACCESS_KEY}
      Storage__SecretKey: ${STORAGE_SECRET_KEY}
      Storage__UseSsl: ${STORAGE_USE_SSL:-false}
      Storage__PublicBaseUrl: ${STORAGE_PUBLIC_BASE_URL:-}
      Storage__DefaultBucket: ${STORAGE_DEFAULT_BUCKET:-agricure-frames}
    # Bind to loopback only — host nginx (running on the VPS) is the only
    # thing that should reach this. The container always listens on 8080.
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8090}:8080"
    networks:
      - agricure
    restart: unless-stopped

  frontend:
    image: ${IMAGE_FRONTEND}
    container_name: agricure-frontend
    depends_on:
      - api
    # Loopback only — host nginx proxies https://agricure.online here.
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8082}:80"
    networks:
      - agricure
    restart: unless-stopped

networks:
  agricure:

volumes:
  postgres-data:
  minio-data:
